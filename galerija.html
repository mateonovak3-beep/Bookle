<header class="py-5 bg-white border-bottom">

<section class="py-5 section-paper">
  <div class="container">

      <div class="col-12">
        <div class="featured-collection">
          <img src="assets/img/slika.jpeg"
               alt="Kolekcija knjiga — Bookle"
               loading="lazy">

            <h3>Kolekcija knjiga</h3>
            <p>Pregled odabranih naslova unutar Bookle galerije</p>
          </div>
        </div>
      </div>

    

      <div class="col-12 col-sm-6 col-lg-4">
        <figure class="gallery-item">
          <img src="assets/img/better than the movies.jpeg"
               alt="Better Than the Movies — Lynn Painter"
               loading="lazy">
          <figcaption>Better Than the Movies — Lynn Painter</figcaption>
        </figure>
      </div>

      <div class="col-12 col-sm-6 col-lg-4">
        <figure class="gallery-item">
          <img src="assets/img/binding 13.jpeg"
               alt="Binding 13 — Chloe Walsh"
               loading="lazy">
          <figcaption>Binding 13 — Chloe Walsh</figcaption>
        </figure>
      </div>

      <div class="col-12 col-sm-6 col-lg-4">
        <figure class="gallery-item">
          <img src="assets/img/ljubavna hipoteza.jpeg"

               loading="lazy">

      </div>

      <div class="col-12 col-sm-6 col-lg-4">
